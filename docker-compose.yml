version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql-bank

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: minibank

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  bank-api:
    build: .

    container_name: bank-api

    ports:
      - "8080:8080"

    depends_on:
      - mysql

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/minibank
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password

volumes:
  mysql_data: